version: '3.9'
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    env_file: .env
    environment:
      LOG_LEVEL: info
    ports:
    - ${API_PORT:-8000}:8000
    volumes:
    - ./data:/app/data
    extra_hosts:
    - db.iopprsupbbrkwxpjgxtj.supabase.co:104.18.38.10
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    env_file: .env
    environment:
      API_BASE_URL: http://api:8000
    ports:
    - ${STREAMLIT_PORT:-8501}:8501
    depends_on:
      api:
        condition: service_started
